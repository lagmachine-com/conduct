name: release
on:
  release:
    types:
      - created
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: install frontend dependencies
        run: |
          cd ui
          npm install

      - name: build frontend
        run: |
          cd ui
          npm run build


      - name: Set environment variable
        if: runner.os != 'Windows'
        run: |
          echo "CONDUCT_BUILD_DESCRIPTION=${{ github.event.release.tag_name || 'v0.0.0' }}" >> "$GITHUB_ENV"
          echo "CONDUCT_BRANCH=${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Set environment variable on Windows
        if: runner.os == 'Windows'
        run: |
          echo "CONDUCT_BUILD_DESCRIPTION=${{ github.event.release.tag_name || 'v0.0.0' }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "CONDUCT_BRANCH=${{ github.sha }}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Show environment variable
        run: |
          echo ${{ env.CONDUCT_BUILD_DESCRIPTION }}
          echo ${{ env.CONDUCT_BRANCH }}

      - name: build
        run: cargo build -r

      - name: Upload to release (Linux)
        if: github.event_name == 'release' && matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: target/release/conduct
          asset_name: conduct
          asset_content_type: application/octet-stream

      - name: Upload to release (Windows)
        if: github.event_name == 'release' && matrix.platform == 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: target/release/conduct.exe
          asset_name: conduct.exe
          asset_content_type: application/octet-stream

  release-blender-integration:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3

    - name: Zip Blender Integration
      run: |
        cd integration
        mv blender conduct-blender
        zip -r conduct-blender.zip conduct-blender

    - name: Upload to release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: integration/conduct-blender.zip
        asset_name: conduct-blender.zip
        asset_content_type: application/zip

  release-inkscape-integration:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3

    - name: Zip Inkscape Integration
      run: |
        cd integration
        mv inkscape conduct-inkscape
        zip -r conduct-inkscape.zip conduct-inkscape

    - name: Upload to release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: integration/conduct-inkscape.zip
        asset_name: conduct-inkscape.zip
        asset_content_type: application/zip
