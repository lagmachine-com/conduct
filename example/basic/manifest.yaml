identifier: bsc
display_name: Basic Project

programs:
  blender:
    exports:
      .mesh.blend: export_blend_library.py
      .shadergraph.blend: export_blend_library.py
    imports:
      .animbake.abc: import_animbake_alembic.py
      .glb: import_glb_mesh.py
      .shadergraph.blend: import_blend_shadergraph.py

departments:
  anim:
    programs:
      blender:
        exports:
        - .animbake.abc
  light:
    default_elements:
    - default_light_rig
  lookdev:
    programs:
      blender:
        exports:
        - .shadergraph.blend
        imports:
        - .glb
        - .mesh.blend
  model:
    programs:
      blender:
        exports:
        - .mesh.blend

assets:
  3d:
    layout:
    - cubeInstancer:
        departments:
          layout:
          - !depends(defaultCubeA)
            - !department_is(light) instancer
    prop:
    - $template:
        departments:
          light:
          - prop_light_rig
    - defaultCubeA:
        departments:
          anim:
          - !scene_local anim_cache
          light:
          - light_rig
          model:
          - mesh
          - !department_is_not(light) lod

shots:
  '103':
    DE:
    - '0010'
    - '0020'
    - '0030'
  '104':
    GK:
    - '0010'
    - '0020'
    - '0030'
    - '0040'
    TCC:
    - '0010'
    - '0020'
    - '0030'
    - '0040'

version_control:
  type: versioned_directories
