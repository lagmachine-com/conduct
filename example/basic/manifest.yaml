identifier: bsc
display_name: Basic Project

programs:
  blender:
    exports:
      .mesh.blend: export_blend_library.py
      .shadergraph.blend: export_blend_library.py
    imports:
      .animbake.abc: import_animbake_alembic.py
      .glb: import_glb_mesh.py
      .shadergraph.blend: import_blend_shadergraph.py

departments:
  anim:
    programs:
      blender:
        exports:
        - .animbake.abc
  lookdev:
    programs:
      blender:
        exports:
        - .shadergraph.blend
        imports:
        - .glb
        - .mesh.blend
  model:
    programs:
      blender:
        exports:
        - .mesh.blend

assets:
  3d:
    layout:
    - cubeInstancer:
        departments:
          layout:
          - !depends(defaultCubeA)
            - !department_is(light) instancer
    prop:
    - defaultCubeA:
        departments:
          model:
          - mesh
          rigging:
          - !department_is(model) rig

version_control:
  type: symlink
  relative: true
  pool: POOL_DIR
