identifier: bsc
display_name: Basic Project

programs:
  blender:
    exports:
      .animbake.abc: export_alembic.py
      .mesh.blend: export_blend_library.py
      .shadergraph.blend: export_blend_library.py
    imports:
      .animbake.abc: import_animbake_alembic.py
      .glb: import_glb_mesh.py
      .mesh.blend: import_blend_library_mesh.py
      .shadergraph.blend: import_blend_shadergraph.py
  inkscape:
    exports:
      .2x.png: export_png_1024.py
      .png: export_png_512.py

departments:
  anim:
    programs:
      blender:
        exports:
        - .animbake.abc
  layout:
    programs:
      blender:
        exports:
        - .instancer.blend
        imports:
        - .mesh.blend
  light:
    default_elements:
    - default_light_rig
    programs:
      blender:
        imports:
        - .glb
        - .mesh.blend
        - .animbake.abc
        - .shadergraph.blend
  lookdev:
    programs:
      blender:
        exports:
        - .shadergraph.blend
        imports:
        - .glb
        - .mesh.blend
  model:
    programs:
      blender:
        exports:
        - .mesh.blend
        - .shadergraph.blend
        - .animbake.abc

assets:
  2d:
    icons:
    - iconA:
        departments:
          design:
          - vector
          - 2x
  3d:
    environment:
    - cubeWorldA:
        departments:
          layout:
          - !depends(defaultCubeA;defaultCubeB) cubeInstancer
    prop:
    - $template:
        departments:
          lookdev:
          - shadergraph
          model:
          - !shot_local mesh
          - lod
          - test
    - defaultCubeA: {}
    - defaultCubeB: {}

shots:
  '103':
    de:
    - '0010'
    - '0020'
    - '0030'
  '104':
    GK:
    - '0010'
    - '0020'
    - '0030'
    - '0040'
    TCC:
    - '0010'
    - '0020'
    - '0030'
    - '0040'

version_control:
  type: versioned_directories
  seperate_shots_and_assets: true
