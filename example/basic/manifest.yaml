identifier: bsc
display_name: Basic Project

programs:
  blender:
    exports:
      .mesh.blend: export_blend_library.py
      .shadergraph.blend: export_blend_library.py
      .animbake.abc: export_alembic.py
    imports:
      .animbake.abc: import_animbake_alembic.py
      .glb: import_glb_mesh.py
      .shadergraph.blend: import_blend_shadergraph.py
      .mesh.blend: import_blend_library_mesh.py

departments:
  anim:
    programs:
      blender:
        exports:
        - .animbake.abc
  light:
    default_elements:
    - default_light_rig
    programs:
      blender:
        imports:
          - .glb
          - .mesh.blend
          - .animbake.abc
          - .shadergraph.blend
  layout:
    programs:
      blender:
        exports:
          - .instancer.blend
        imports:
          - .mesh.blend
  lookdev:
    programs:
      blender:
        exports:
        - .shadergraph.blend
        imports:
        - .glb
        - .mesh.blend
  model:
    programs:
      blender:
        exports:
        - .mesh.blend
        - .shadergraph.blend
        - .animbake.abc

assets:
  3d:
    prop:
    - $template:
        departments:
          model:
          - !shot_local mesh
          - lod
          - test
          lookdev:
          - shadergraph
    - defaultCubeA:
        departments: {}
    - defaultCubeB:
        departments: {}
    environment:
    - cubeWorldA:
        departments:
          layout:
            - !depends(defaultCubeA;defaultCubeB) cubeInstancer

shots:
  '103':
    de:
    - '0010'
    - '0020'
    - '0030'
  '104':
    GK:
    - '0010'
    - '0020'
    - '0030'
    - '0040'
    TCC:
    - '0010'
    - '0020'
    - '0030'
    - '0040'

version_control:
  type: versioned_directories
